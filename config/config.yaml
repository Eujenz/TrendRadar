# ===============================================================
# 3. 數據源 - RSS 訂閱
#
# 與熱榜數據分開存儲，按時間流展示
# 每個源配置：id(唯一標識)、name(顯示名稱)、url(訂閱地址)
# enabled: 可選，默認 true
# max_age_days: 可選，覆蓋全局 freshness_filter.max_age_days
# ===============================================================
rss:
  enabled: true                       # 是否啟用 RSS 抓取

  # 文章新鮮度過濾配置（全局默認值）
  # 過濾掉發布時間超過指定天數的舊文章，避免同一篇文章重複出現在推送中
  #
  # 過濾邏輯：
  #   - 文章發布時間距當前時間（app.timezone 時區）超過 N 天則不推送
  #   - 無發布時間的文章會被保留（不過濾）
  #
  # ⚠️ 過濾時機：在推送階段過濾
  #    - 所有文章都會存入數據庫（MCP Server 的 AI 查詢仍可訪問）
  #    - 只有新鮮的文章會被推送到通知渠道
  freshness_filter:
    enabled: true                     # 是否啟用新鮮度過濾（默認啟用）

    max_age_days: 3                   # 最大文章年齡（天）
                                      # - 正整數：只推送 N 天內的文章
                                      # - 0：禁用過濾，推送所有文章

  # 單個 feed 可配置 max_age_days 覆蓋全局設置：
  # - 不配置：使用全局 freshness_filter.max_age_days（默認 3 天）
  # - 正整數：覆蓋全局設置，只推送此天數內的文章
  # - 0：禁用此頻道的新鮮度過濾，推送所有文章
  feeds:
    # - id: "blocktempo"
    #   name: "動區動趨"
    #   url: "https://www.blocktempo.com/feed/"
    #   max_age_days: 1               # 示例：只推送1天內的文章

    # - id: "ruanyifeng"
    #   name: "阮一峰的網絡日誌"
    #   url: "http://www.ruanyifeng.com/blog/atom.xml"
    #   max_age_days: 7               # 示例：推送7天內的文章（更新較慢的博客）
    
    - id: "BusinessNext"
      name: "數位時代"
      url: "https://www.bnext.com.tw/rss"
      max_age_days: 1                 

    - id: "INSIDE"
      name: "INSIDE"
      url: "http://www.inside.com.tw/feed"
      max_age_days: 1    

    # - id: "Techbang"
    #   name: "T客邦"
    #   url: "http://ftr.fivefilters.org/makefulltextfeed.php?url=http%3A%2F%2Ffeeds.feedburner.com%2Ftechbang&max=3"
    #   max_age_days: 1                      

    # - id: "WOSHIPM"
    #   name: "人人都是產品經理"
    #   url: "http://www.woshipm.com/feed"
    #   max_age_days: 1                      

    # - id: "AGRITECH-FORESIGHT"
    #   name: "農業科技新脈動"
    #   url: "http://agritech-foresight.atri.org.tw/rss/rss/13"
    #   max_age_days: 1 

    - id: "Businessweekly"
      name: "商業周刊"
      url: "http://ftr.fivefilters.org/makefulltextfeed.php?url=http%3A%2F%2Fwww.businessweekly.com.tw%2Ffeedsec.aspx%3Ffeedid%3D3%26channelid%3D2&max=3"
      max_age_days: 1 

    - id: "Manager Today"
      name: "經理人"
      url: "http://ftr.fivefilters.org/makefulltextfeed.php?url=https%3A%2F%2Fwww.managertoday.com.tw%2Frss&max=3"
      max_age_days: 1 

    # - id: "Toy People News"
    #   name: "玩具人"
    #   url: "http://rss.toy-people.com/rss_toy"
    #   max_age_days: 1 


    # 自定義源示例
    # - id: "custom-feed"
    #   name: "自定義源"
    #   url: "https://example.com/feed.xml"
    #   enabled: false
    #   max_age_days: 0               # 示例：禁用過濾，推送所有文章


# ===============================================================
# 4. 報告模式
#
# 🔸 daily（當日匯總模式）
#    • 推送時機：按時推送(默認每小時推送一次)
#    • 顯示內容：當日所有匹配新聞 + 新增新聞區域
#    • 適用場景：日報總結、全面了解當日熱點趨勢
#
# 🔸 current（當前榜單模式）
#    • 推送時機：按時推送(默認每小時推送一次)
#    • 顯示內容：當前榜單匹配新聞 + 新增新聞區域
#    • 適用場景：實時熱點追蹤、了解當前最火的內容
#
# 🔸 incremental（增量監控模式）
#    • 推送時機：有新增才推送
#    • 顯示內容：新出現的匹配頻率詞新聞
#    • 適用場景：避免重複信息乾擾
# ===============================================================
report:
  mode: "current"                     # 可選: daily | current | incremental
  display_mode: "keyword"             # 分組維度: keyword | platform
                                      # keyword: 按關鍵詞分組顯示（默認）
                                      # platform: 按平台/來源分組顯示

  # 關鍵詞組排序方式（僅 display_mode: keyword 時生效）
  # true: 按 frequency_words.txt 中的定義順序排列
  # false: 按匹配到的熱點條數排序（條數多的在前）
  sort_by_position_first: false

  rank_threshold: 5                   # 排名高亮閾值

  max_news_per_keyword: 0             # 每個關鍵詞最大顯示數量（0=不限制）


# ===============================================================
# 5. 推送內容控制
#
# 統一管理推送消息中顯示哪些區域及其排列順序
# ===============================================================
display:
  # 📋 區域顯示順序
  # 列表從上到下的順序 = 推送消息中從上到下的顯示順序
  # 想調整順序？直接剪切粘貼整行即可，例如把 ai_analysis 移到最前面：
  #   region_order:
  #     - ai_analysis    ← 移到第一行，AI 分析就會顯示在最頂部
  #     - new_items
  #     - hotlist
  #     - ...
  # 注意：區域需同時滿足兩個條件才會顯示：
  #   1. 在此列表中
  #   2. 下方 regions 中對應開關為 true
  region_order:
    - ai_analysis                     # 1️⃣ AI 分析區域
    - new_items                       # 2️⃣ 新增熱點區域
    - hotlist                         # 3️⃣ 熱榜區域（關鍵詞匹配）
    - rss                             # 4️⃣ RSS 訂閱區域
    - standalone                      # 5️⃣ 獨立展示區

  # 推送區域開關
  # 控制各區域是否啟用（配合 region_order 使用）
  regions:
    hotlist: true                     # 熱榜區域（關鍵詞匹配的熱點新聞）
    new_items: true                   # 新增熱點區域（含熱榜新增 + RSS 新增）
                                      # 注：熱點詞彙統計中的新增標記🆕不受此配置影響

    rss: true                         # RSS 訂閱區域
                                      # 開啟後將對 RSS 進行關鍵詞分析並在通知中展示
                                      # 關閉後跳過分析，但獨立展示區不受影響

    standalone: true                 # 獨立展示區（完整熱榜/RSS，不受關鍵詞過濾）
    ai_analysis: true                 # AI 分析區域

  # 📋 獨立展示區配置（僅在 regions.standalone: true 時生效）
  # 用途：將指定平台的完整熱榜/RSS 單獨展示，不受關鍵詞過濾影響
  # 適用場景：
  #   - 想完整查看某個平台的熱榜排名
  #   - RSS 源內容較少，希望全部展示而非只顯示關鍵詞匹配的
  # 注意：同一新聞可能同時出現在關鍵詞匹配區和獨立展示區
  standalone:
    platforms: ["github"]                     # 熱榜平台 ID 列表（如 ["zhihu", "weibo"]）
    rss_feeds: []                     # RSS 源 ID 列表（如 ["hacker-news"]）
    max_items: 10                     # 每個源最多展示條數（0=不限制）


# ===============================================================
# 6. 推送通知
#
# ⚠️ 重要安全警告 ⚠️
#
# 🔴 請務必妥善保管好 webhooks，不要公開!!!
# 🔴 如果你以 fork 的方式部署在 GitHub 上，請勿在此填寫
# 🔴 而是將 webhooks 填入 GitHub Secrets
#    (Settings → Secrets and variables → Actions)
# 🔴 否則：
#    - 輕則：手機上收到大量垃圾廣告推送
#    - 重則：webhook 被濫用造成嚴重安全隱患
#
# 📌 多賬號支持說明
#
# • 使用分號(;)分隔多個賬號，如："url1;url2;url3"
# • 需要配對的配置（如 Telegram 的 token 和 chat_id）數量必須一致
# • 每個渠道最多支持 max_accounts_per_channel 個賬號
# • 郵箱已支持多收件人（逗號分隔）
# ===============================================================
notification:
  enabled: true                       # 是否啟用通知功能

  # 🕐 推送時間窗口控制（可選功能）
  # 用途：限制推送的時間範圍，避免非工作時間打擾
  # 適用場景：
  #   • 只想在工作日白天接收推送（如 09:00-18:00）
  #   • 希望在晚上固定時間收到匯總（如 20:00-22:00）
  # ⚠️ GitHub Actions 用戶注意：
  #   執行時間不穩定，時間範圍建議至少留足 2 小時
  # 💡 想要精準定時？建議使用 Docker 部署在個人服務器上
  push_window:
    enabled: false                    # 是否啟用推送時間窗口控制
    start: "07:00"                    # 開始時間（北京時間）
    end: "19:00"                      # 結束時間（北京時間）
    once_per_day: true                # true=窗口內只推送一次，false=窗口內每次執行都推送

  # 推送渠道配置
  channels:
    feishu:
      webhook_url: ""                 # ■書機器人 webhook URL

    dingtalk:
      webhook_url: ""                 # 釘釘機器人 webhook URL

    wework:
      webhook_url: ""                 # 企業微信機器人 webhook URL
      msg_type: "markdown"            # 消息類型：markdown(群機器人) | text(個人微信應用)

    telegram:
      bot_token: ""                   # Telegram Bot Token
      chat_id: ""                     # Telegram Chat ID

    email:
      from: ""                        # 發件人郵箱地址
      password: ""                    # 發件人郵箱密碼或授權碼
      to: ""                          # 收件人郵箱，多個用逗號分隔
      smtp_server: ""                 # SMTP 服務器（可選，留空自動識別）
      smtp_port: ""                   # SMTP 端口（可選，留空自動識別）

    ntfy:
      server_url: "https://ntfy.sh"   # ntfy 服務器地址（可改為自託管）
      topic: ""                       # ntfy 主題名稱
      token: ""                       # ntfy 訪問令牌（可選，用於私有主題）

    bark:
      url: ""                         # Bark 推送 URL（格式：https://api.day.app/your_device_key）

    slack:
      webhook_url: ""                 # Slack Incoming Webhook URL

    generic_webhook:
      webhook_url: ""                 # 通用 Webhook URL（支持 Discord、Matrix、IFTTT 等）
      payload_template: ""            # JSON 模板，支持 {title} 和 {content} 占位符
                                      # 示例：{"content": "{content}"}
                                      # 留空則使用默認格式：{"title": "{title}", "content": "{content}"}


# ===============================================================
# 7. 存儲配置
# ===============================================================
storage:
  # 存儲後端選擇
  # - auto: 自動選擇（GitHub Actions 且配置了遠程存儲 → remote，否則 → local）
  # - local: 本地 SQLite + TXT/HTML 文件
  # - remote: 遠程雲存儲（S3 兼容協議，支持 R2/OSS/COS 等）
  backend: "auto"

  # 數據格式選項
  formats:
    sqlite: true                      # 主存儲（必須啟用）
    txt: true                        # 是否生成 TXT 快照
    html: true                       # 是否生成 HTML 報告（⚠️ 郵件推送或者需要看網頁版報告必須設為 true）

  # 本地存儲配置
  local:
    data_dir: "output"                # 數據目錄
    retention_days: 0                 # 保留天數（0=永久保留）

  # 遠程存儲配置（S3 兼容協議）
  # 支持: Cloudflare R2, 阿里雲 OSS, 騰訊雲 COS, AWS S3, MinIO 等
  # 建議將敏感信息配置在 GitHub Secrets 或環境變量中
  remote:
    retention_days: 0                 # 保留天數（0=永久保留）

    # S3 兼容配置（或使用環境變量 S3_ENDPOINT_URL 等）
    endpoint_url: ""                  # 服務端點
                                      # Cloudflare R2: https://<account_id>.r2.cloudflarestorage.com
                                      # 阿里雲 OSS: https://oss-cn-hangzhou.aliyuncs.com
                                      # 騰訊雲 COS: https://cos.ap-guangzhou.myqcloud.com
    bucket_name: ""                   # 存儲桶名稱
    access_key_id: ""                 # 訪問密鑰 ID
    secret_access_key: ""             # 訪問密鑰
    region: ""                        # 區域（可選，部分服務商需要）

  # 數據拉取配置（從遠程同步到本地）
  # 用於 MCP Server 等場景：爬蟲存到遠程，MCP 拉取到本地分析
  pull:
    enabled: false                    # 是否啟用啟動時自動拉取
    days: 7                           # 拉取最近 N 天的數據


# ===============================================================
# 8. AI 模型配置（共享）
#
# ai_analysis 和 ai_translation 共用此模型配置
# 基於 LiteLLM 統一接口，支持 100+ AI 提供商
# ===============================================================
ai:
  # LiteLLM 模型格式: provider/model_name
  # 示例:
  #   - deepseek/deepseek-chat (DeepSeek)
  #   - openai/gpt-4o (OpenAI)
  #   - gemini/gemini-2.5-flash (Google Gemini)
  #   - anthropic/claude-3-5-sonnet (Anthropic)
  #   - ollama/llama3 (本地 Ollama)
  # 完整列表: https://docs.litellm.ai/docs/providers
  # 如果你對於看英文文檔比較頭疼，那麼可以點擊頁面右下角的 【Ask AI】 ,用中文詢問怎麼配置 
  
  model: "openrouter/elephant-alpha"

  api_key: ""                       # API Key（建議使用環境變量 AI_API_KEY）
  
  api_base: "https://openrouter.ai/api/v1"                      # 自定義 API 端點（可選，大多數情況留空）
                                    # 示例: https://api.openai.com/v1（自建代理或兼容接口）
                                    #
                                    # 💡 高級用法：連接任意兼容 OpenAI 協議的模型商
                                    # 如果你使用的模型商不在上述支持列表中，但提供了兼容 OpenAI 的接口：
                                    #
                                    # 1. api_base 填寫: 服務商提供的接口地址
                                    #    例如: https://api.example.com/v1
                                    #
                                    # 2. model 填寫: "openai/" + 實際模型名稱
                                    #    例如: openai/deepseek-ai/DeepSeek-V3
                                    #    (原理：前綴 openai/ 強制 LiteLLM 使用 OpenAI 協議格式進行通信)


  timeout: 120                      # 請求超時（秒）

  # AI 參數配置
  temperature: 1.0                  # 采樣溫度 (0.0-2.0)
                                    # 注意：部分模型(如 gpt-5)可能要求必須為 1.0，否則會報錯

  max_tokens: 5000                  # 最大生成 token 數
                                    # 注意：如果 API 不支持此參數(報 HTTP 400)，請設為 0 以禁用發送

  # 高級選項
  num_retries: 2                    # 失敗重試次數
  fallback_models: ["nvidia/nemotron-3-super-120b-a12b:free"]               # 備用模型列表（可選）
                                    # 示例: ["openai/gpt-4o-mini", "openai/deepseek-ai/DeepSeek-V3"]

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 額外參數 (高級選項，一般無需修改)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # LiteLLM 會自動將通用參數轉換為各提供商格式，無需手動適配。
  # 僅在需要傳遞特殊參數時啟用此項。
  #
  # 提示：你可以根據模型 API 文檔自行添加任何支持的字段。
  # 操作：如需啟用，請刪掉該行最前方的 "# "（井號和空格）。
  # 注意：如果這幾行都帶著井號，則代表不使用額外參數（推薦做法）。
  # -------------------------------------------------------------
  # extra_params:
  #   top_p: 1.0              # 核采樣（通用）
  #   presence_penalty: 0.0   # 話題多樣性（OpenAI/DeepSeek）
  #   stop: ["END"]           # 停止詞列表（通用）


# ===============================================================
# 9. AI 分析功能
#
# 使用 AI 大模型對推送內容進行深度分析
# 模型配置見上方 ai 配置段
# ===============================================================
ai_analysis:
  enabled: true                     # 是否啟用 AI 分析

  # 分析報告輸出語言
  # 格式：自然語言描述
  # 示例: "English", "Korean", "法語"
  language: "Chinese"

  # 提示詞配置文件路徑（相對於 config 目錄）
  prompt_file: "ai_analysis_prompt.txt"

  # 分析內容配置
  max_news_for_analysis: 50         # 參與分析的新聞數量上限（控製成本關鍵項）
                                    # 當前默認的【報告模式】是【當前榜單模式】（current），也就是隻分析當前在熱榜的新聞
                                    # 如果需要讓報告呈現出更有參考價值的完整一天的趨勢，且你的 token 充裕
                                      # 可開啟 daily（當日匯總模式）
                                      # 同時調整 max_news_for_analysis 為 150(你自己視情況調整，推送消息頂部有 ai 分析數目供參考)

                                    # api 成本估算 (僅供參考)
                                      # 按默認推送頻率和模型(deepseek)
                                      # 且 include_rank_timeline 為 false
                                    # 則
                                      # GitHub Action 部署默認推送約 20 次（每小時推送一次）， 約 0.1 元/天
                                      # Docker 部署默認推送 48 次(每半小時推送一次)， 約 0.2 元/天

  include_rss: true                # 是否包含 RSS 內容進行分析

  include_rank_timeline: false      # 是否傳遞完整排名時間線
                                    # false: 使用簡化格式（排名範圍+時間範圍+出現次數）
                                    # true: 傳遞完整排名變化軌跡（如 1(09:30)→2(10:00)→0(11:00)）
                                    # 啟用後 AI 能更精確分析熱度趨勢，但會額外增加 token 消耗（0.5 倍到 1 倍）


# ===============================================================
# 10. AI 翻譯功能
#
# 對推送內容進行多語言翻譯，不包含 ai_analysis 分析的內容 
# 模型配置見上方 ai 配置段
# ===============================================================
ai_translation:
  enabled: false                   # 是否啟用翻譯功能

  # 翻譯目標語言
  # 格式：自然語言描述
  # 示例: "Chinese", "Korean", "法語"
  language: "English"

  # 提示詞配置文件路徑（相對於 config 目錄）
  prompt_file: "ai_translation_prompt.txt"


# ===============================================================
# 11. 高級設置（一般無需修改）
# ===============================================================
advanced:
  # 調試模式
  debug: false

  # 版本檢查
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"

  # 熱榜爬蟲技術參數
  crawler:
    request_interval: 2000            # 請求間隔（毫秒）
    use_proxy: false                  # 是否啟用代理
    default_proxy: "http://127.0.0.1:10801"

  # RSS 設置
  rss:
    request_interval: 1000            # 請求間隔（毫秒）
    timeout: 15                       # 請求超時（秒）
    use_proxy: false                  # 是否使用代理
    proxy_url: ""                     # RSS 專屬代理（留空則使用 crawler.default_proxy）

  # 排序權重（用於重新排序不同平台的熱搜）
  # 合起來等於 1
  weight:
    rank: 0.6                         # 排名權重
    frequency: 0.3                    # 頻次權重
    hotness: 0.1                      # 熱度權重

  # 多賬號限制
  max_accounts_per_channel: 3         # 每個渠道最大賬號數量

  # 消息分批大小（字節）- 內部配置，請勿修改
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3              # 批次發送間隔（秒）
  feishu_message_separator: "━━━━━━━━━━━━━━━━━━━"
