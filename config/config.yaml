    name: "華爾街見聞 最熱"
  - id: "cls-hot"
    name: "財聯社熱門"
  - id: "cls-depth"
    name: "財聯社深度"

  # === 社交/短視頻/娛樂類 ===
  # - id: "weibo"
  #   name: "微博"
  # - id: "douyin"
  #   name: "抖音"
  # - id: "bilibili-hot-search"
  #   name: "bilibili 熱搜"
  # - id: "tieba"
  #   name: "貼吧"
  # - id: "zhihu"
  #   name: "知乎"

